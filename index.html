          const ua=userInputs[q.id]?.[bi]||""; const isOk=isRev?checkAns(q.id,bi):null;
          return<div key={bi} style={{marginBottom:14}}>
            <label style={{fontFamily:"var(--font)",fontSize:mc?"1.2rem":"0.82rem",display:"block",marginBottom:6,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:1}}>{blank.label}</label>
            <TxtInput value={ua} onChange={e=>handleInput(bi,e.target.value)} disabled={isRev} placeholder="Type your answer…" style={{borderColor:isOk===true?"var(--accent)":isOk===false?"var(--danger)":undefined}}/>
            {isRev&&isOk===false&&<div style={{fontSize:mc?"1.1rem":"0.85rem",color:"var(--accent)",marginTop:4}}>✔ Correct: {blank.answer}</div>}
          </div>;
        })}
        {isRev&&!qScore(q)&&<div style={{marginTop:8,fontSize:mc?"1.1rem":"0.85rem",color:"var(--text-dim)",background:"var(--surface2)",padding:"8px 12px",borderRadius:"var(--radius)",borderLeft:"3px solid var(--warn)"}}>💡 {q.explanation}</div>}
        {isRev&&qScore(q)&&<div style={{fontSize:mc?"1.3rem":"1rem",color:"var(--accent)",marginTop:4}}>✔ {mc?"CORRECT!":"Correct!"}</div>}
      </Panel>
      <div style={{display:"flex",gap:12}}>
        <Btn disabled={current===0} style={{flex:1}} onClick={()=>setCurrent(c=>c-1)}>{mc?"◀ PREV":"← Prev"}</Btn>
        {config.feedback==="immediate"&&!isRev&&<Btn variant="blue" style={{flex:1}} onClick={()=>setRevealed(p=>({...p,[q.id]:true}))}>{mc?"CHECK ✔":"Check ✔"}</Btn>}
        {current<questions.length-1?<Btn variant="blue" style={{flex:1}} onClick={()=>setCurrent(c=>c+1)}>{mc?"NEXT ▶":"Next →"}</Btn>:<Btn variant="green" style={{flex:1}} onClick={()=>setShowResult(true)}>{mc?"FINISH ✔":"Finish ✔"}</Btn>}
      </div>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────
export default function App() {
  const [theme,setTheme]=useState("minecraft");
  const [darkMode,setDarkMode]=useState(true);

  const hk=theme==="hellokitty"; const mc=theme==="minecraft";

  return(
    <>
      <style>{GLOBAL_STYLE}</style>
      <ThemeContext.Provider value={{theme,setTheme,darkMode,setDarkMode}}>
        <div className={`t-${theme} ${darkMode?"dark":"light"}`} style={{minHeight:"100vh",width:"100%",background:"var(--bg)",color:"var(--text)",fontFamily:"var(--font)"}}>
          {/* Theme nav bars */}
          {mc&&screen!=="welcome"&&<div style={{background:"#1a1a1a",borderBottom:"4px solid #555",padding:"8px 20px",fontFamily:"var(--font)",fontSize:"1.1rem",color:"#5dbb5d",textShadow:"2px 2px 0 #000"}}>■ STUDYMAXXING</div>}
          {theme==="moodle"&&screen!=="welcome"&&<div style={{background:"#c55a11",padding:"10px 24px",display:"flex",alignItems:"center",gap:16,boxShadow:"0 2px 4px rgba(0,0,0,0.15)"}}><span style={{color:"#fff",fontWeight:"700",fontSize:"1.05rem"}}>📚 StudyMaxxing</span><span style={{color:"rgba(255,255,255,0.7)",fontSize:"0.8rem"}}>Personal Reviewer</span></div>}
          {theme==="forms"&&screen!=="welcome"&&<div style={{background:"var(--accent)",padding:"10px 24px"}}><span style={{color:"#fff",fontWeight:"700",fontSize:"0.95rem"}}>📋 StudyMaxxing</span></div>}
          {theme==="zen"&&screen!=="welcome"&&<div style={{borderBottom:"1px solid var(--border)",padding:"12px 24px"}}><span style={{color:"var(--accent)",fontSize:"0.9rem",fontWeight:"600"}}>🪷 StudyMaxxing</span></div>}
          {hk&&screen!=="welcome"&&<div style={{background:"linear-gradient(135deg,#ff4d88,#ff88bb)",padding:"10px 24px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 8px rgba(255,77,136,0.3)"}}><span style={{fontSize:"1.1rem"}}>🎀</span><span style={{color:"#fff",fontWeight:"700",fontSize:"1rem",fontFamily:"var(--font)"}}>StudyMaxxing</span><span style={{color:"rgba(255,255,255,0.8)",fontSize:"0.8rem"}}>✿ Personal Reviewer ✿</span></div>}

          {screen==="welcome"&&<WelcomeScreen onEnter={()=>navigate("menu")}/>}
          {screen==="menu"&&<MainMenu onNavigate={navigate}/>}
          {screen==="themes"&&<ThemePicker onBack={()=>navigate("menu")}/>}
          {screen==="subject"&&<SubjectMenu subject={ctx.subject} onNavigate={navigate} onBack={()=>navigate("menu")}/>}
          {screen==="quizSetup"&&<QuizSetup subject={ctx.subject} period={ctx.period} onStart={cfg=>navigate("quiz",{quizConfig:cfg})} onBack={()=>navigate("subject")}/>}
          {screen==="quiz"&&<QuizScreen subject={ctx.subject} period={ctx.period} config={ctx.quizConfig} onBack={()=>navigate("subject")}/>}
          {screen==="flashcards"&&<FlashcardScreen subject={ctx.subject} period={ctx.period} onBack={()=>navigate("subject")}/>}
          {screen==="codeQuizPeriod"&&<CodeQuizPeriodSelect subject={ctx.subject} onNavigate={navigate} onBack={()=>navigate("subject")}/>}
          {screen==="codeQuizSetup"&&<CodeQuizSetup subject={ctx.subject} codeQuizPeriod={ctx.codeQuizPeriod} onStart={cfg=>navigate("codeQuiz",{codeConfig:cfg})} onBack={()=>navigate("codeQuizPeriod")}/>}
          {screen==="codeQuiz"&&<CodeQuizScreen config={ctx.codeConfig} onBack={()=>navigate("subject")}/>}
        </div>
      </ThemeContext.Provider>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
