<body>
  <div id="root"></div>

  <!-- React + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    const { useState, createContext, useContext } = React;
const ThemeContext = createContext(null);
const useTheme = () => useContext(ThemeContext);

const THEMES = {
  minecraft: { id:"minecraft", label:"Minecraft",    emoji:"⛏️",  desc:"Pixelated & blocky" },

  forms:     { id:"forms",     label:"Google Forms",  emoji:"📋",  desc:"Clean survey style" },
  zen:       { id:"zen",       label:"Zen",           emoji:"🪷",  desc:"Minimal & focused" },
  hellokitty:{ id:"hellokitty",label:"Hello Kitty",   emoji:"🎀",  desc:"Cute & kawaii!" },
};

const GLOBAL_STYLE = `
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Source+Sans+3:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=Quicksand:wght@400;500;600;700&display=swap');

  html, body, #root { width:100%; min-height:100vh; margin:0; padding:0; overflow-x:hidden; }
  .slide-in { animation:slideIn 0.18s ease-out; }
  @keyframes slideIn { from{transform:translateY(12px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .blink { animation:blink 1s step-start infinite; }
  @keyframes blink { 50%{opacity:0;} }

  .t-minecraft { --bg:#1a1a1a;--surface:#2d2d2d;--surface2:#3d3d3d;--border:#555;--accent:#5dbb5d;--danger:#e05252;--warn:#f0d060;--info:#5a9fd4;--text:#f0f0f0;--text-dim:#aaa;--font:'VT323',monospace;--radius:0px;--shadow:4px 4px 0 #000; }
  .t-minecraft.light { --bg:#b0b0b0;--surface:#d0d0d0;--surface2:#e0e0e0;--border:#888;--text:#111;--text-dim:#555; }

  /* MOODLE */

  .t-forms.dark { --bg:#1a1a2e;--surface:#252545;--surface2:#2e2e58;--border:#4a4a88;--text:#e8e8ff;--text-dim:#9090cc; }

  /* ZEN */
  .t-zen { --bg:#fafaf8;--surface:#fff;--surface2:#f5f5f0;--border:#e4e4dc;--accent:#2d6a4f;--danger:#9b2335;--warn:#b5642a;--info:#2c5f8a;--text:#1a1a1a;--text-dim:#777;--font:'DM Sans',sans-serif;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,0.07); }

  .t-hellokitty.dark { --bg:#2a0818;--surface:#3d1028;--surface2:#4a1535;--border:#8b2050;--text:#ffe0ee;--text-dim:#cc88aa;--shadow:0 4px 14px rgba(255,77,136,0.3); }
  .t-hellokitty .hk-bow { color: var(--accent); }

// ── Themed Components ─────────────────────────────────────────────────────────
function Btn({ children, variant="default", onClick, disabled, style={}, fullWidth }) {
  const { theme } = useTheme();
  const mc = theme==="minecraft";
  const hk = theme==="hellokitty";
  const base = {
    fontFamily:"var(--font)", cursor:disabled?"not-allowed":"pointer",
    border:"none", outline:"none", transition:"all 0.15s",
    width:fullWidth?"100%":undefined, opacity:disabled?0.5:1,
    fontSize:mc?"1.3rem":hk?"1rem":"0.92rem",
    fontWeight:mc?"normal":hk?"700":"600",
    letterSpacing:mc?"1px":hk?"0.03em":"0.02em",
    userSelect:"none", ...style
  };
  if (mc) {
    const cv={default:{bg:"var(--surface)",col:"var(--text)",bt:"var(--border)",bb:"#222",br:"#222"},green:{bg:"#3a6e3a",col:"#fff",bt:"var(--accent)",bb:"#1e3e1e",br:"#1e3e1e"},red:{bg:"#6e2020",col:"#fff",bt:"var(--danger)",bb:"#3e1010",br:"#3e1010"},blue:{bg:"#1e3e5e",col:"#fff",bt:"var(--info)",bb:"#0e1e2e",br:"#0e1e2e"}}[variant]||{bg:"var(--surface)",col:"var(--text)",bt:"var(--border)",bb:"#222",br:"#222"};
    return <button onClick={onClick} disabled={disabled} style={{...base,background:cv.bg,color:cv.col,padding:"9px 18px",borderTop:`3px solid ${cv.bt}`,borderLeft:`3px solid ${cv.bt}`,borderRight:`3px solid ${cv.br}`,borderBottom:`3px solid ${cv.bb}`,textShadow:"2px 2px 0 #000"}} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter="brightness(1.25)"}} onMouseLeave={e=>e.currentTarget.style.filter=""}>{children}</button>;
  }
  if (hk) {
    const cv={default:{bg:"var(--surface)",col:"var(--accent)",brd:"2.5px solid var(--accent)"},green:{bg:"var(--accent)",col:"#fff",brd:"none"},red:{bg:"var(--danger)",col:"#fff",brd:"none"},blue:{bg:"var(--info)",col:"#fff",brd:"none"}}[variant]||{bg:"var(--surface)",col:"var(--accent)",brd:"2.5px solid var(--accent)"};
    return <button onClick={onClick} disabled={disabled} style={{...base,background:cv.bg,color:cv.col,border:cv.brd,borderRadius:"var(--radius)",padding:"10px 20px",boxShadow:variant!=="default"?"0 3px 10px rgba(255,77,136,0.3)":"var(--shadow)"}} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.transform="translateY(-1px)"}} onMouseLeave={e=>e.currentTarget.style.transform=""}>{children}</button>;
  }
  const cv={default:{bg:"var(--surface)",col:"var(--text)",brd:"1px solid var(--border)"},green:{bg:"var(--accent)",col:"#fff",brd:"none"},red:{bg:"var(--danger)",col:"#fff",brd:"none"},blue:{bg:"var(--info)",col:"#fff",brd:"none"}}[variant]||{bg:"var(--surface)",col:"var(--text)",brd:"1px solid var(--border)"};
  return <button onClick={onClick} disabled={disabled} style={{...base,background:cv.bg,color:cv.col,border:cv.brd,borderRadius:"var(--radius)",padding:"9px 18px",boxShadow:variant!=="default"?"0 2px 5px rgba(0,0,0,0.15)":"var(--shadow)"}} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter="brightness(0.93)"}} onMouseLeave={e=>e.currentTarget.style.filter=""}>{children}</button>;
}

function Panel({ children, style={}, accent }) {
  const { theme } = useTheme();
  const mc=theme==="minecraft"; const hk=theme==="hellokitty";
  return <div style={{background:"var(--surface)",
    border:mc?`4px solid ${accent||"var(--border)"}`:`${hk?"2.5px":"1px"} solid ${accent||"var(--border)"}`,
    borderRight:mc?"4px solid #222":undefined,borderBottom:mc?"4px solid #222":undefined,
    borderRadius:mc?0:"var(--radius)",padding:20,boxShadow:mc?"none":"var(--shadow)",...style}}>{children}</div>;
}

function TxtInput({ value, onChange, type="text", placeholder, disabled, min, max, style={} }) {
  const { theme } = useTheme(); const mc=theme==="minecraft"; const hk=theme==="hellokitty";
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} min={min} max={max} style={{fontFamily:"var(--font)",fontSize:mc?"1.3rem":"0.92rem",background:mc?"#111":"var(--surface2)",color:"var(--text)",border:mc?"3px solid var(--border)":`${hk?"2px":"1px"} solid var(--border)`,borderRadius:mc?0:"var(--radius)",padding:"8px 12px",outline:"none",width:"100%",...style}}/>;
}

function Divider() {
  const { theme } = useTheme(); const mc=theme==="minecraft";
  return <div style={{height:mc?4:1,background:mc?"repeating-linear-gradient(90deg,var(--border) 0px,var(--border) 8px,transparent 8px,transparent 16px)":"var(--border)",margin:"16px 0"}}/>;
}

function ProgBar({ value }) {
  const { theme } = useTheme(); const mc=theme==="minecraft"; const hk=theme==="hellokitty";
  return <div style={{height:mc?20:hk?12:6,background:mc?"#111":"var(--surface2)",border:mc?"3px solid var(--border)":"none",borderRadius:mc?0:99,overflow:"hidden",marginBottom:20}}>
    <div style={{height:"100%",width:`${value*100}%`,background:hk?"linear-gradient(90deg,#ff4d88,#ff88bb)":"var(--accent)",borderRadius:mc?0:99,transition:"width 0.35s",boxShadow:mc?"inset 0 -3px 0 rgba(0,0,0,0.4)":hk?"0 0 8px rgba(255,77,136,0.4)":"none"}}/></div>;
}

function H({ children, size="xl", color, style={} }) {
  const { theme } = useTheme(); const mc=theme==="minecraft"; const hk=theme==="hellokitty";
  const sz={xl:mc?"clamp(2.8rem,9vw,5rem)":hk?"clamp(2.2rem,7vw,3.5rem)":"clamp(1.8rem,5vw,2.8rem)",lg:mc?"2.4rem":hk?"2rem":"1.7rem",md:mc?"1.8rem":"1.25rem",sm:mc?"1.4rem":"0.95rem"}[size];
  return <div style={{fontFamily:"var(--font)",fontSize:sz,fontWeight:mc?"normal":"700",color:color||"var(--accent)",textShadow:mc?"4px 4px 0 #000":hk?"1px 2px 4px rgba(255,77,136,0.25)":"none",letterSpacing:mc?"3px":hk?"0.05em":"-0.02em",lineHeight:1.15,...style}}>{children}</div>;
}

const COMPROG_MIDTERMS_MCQ = [
  // W6 — Loops
  {id:"cm1",question:"What is a loop in programming?",choices:["A decision structure","A repeated execution of code","A variable declaration","A class definition"],answer:1,explanation:"A loop is a programming structure that allows the same block of code to run multiple times automatically, as long as a condition is true."},
  {id:"cm2",question:"Which loop checks its condition before executing the body?",choices:["do-while","while","switch","case"],answer:1,explanation:"A while loop is a pre-test loop — the condition is checked before the body runs. If false at the start, the body never executes."},
  {id:"cm3",question:"Which loop guarantees the body executes at least once?",choices:["while","for","do-while","if"],answer:2,explanation:"A do-while loop executes its statements first, then checks the condition afterward, so the body always runs at least once."},
  {id:"cm4",question:"Which loop is commonly used when the number of iterations is known?",choices:["while","for","do-while","switch"],answer:1,explanation:"The for loop is ideal when you know exactly how many times to repeat. It has initialization, condition, and update in one line."},
  {id:"cm5",question:"Which keyword immediately exits a loop?",choices:["continue","break","exit","return"],answer:1,explanation:"break stops the loop immediately and transfers control to the statement after the loop."},
  {id:"cm6",question:"What is printed?\n\nfor(int i=1;i<=3;i++){\n  System.out.print(i);\n}",choices:["123","321","012","Error"],answer:0,explanation:"Loop runs with i=1,2,3. Each iteration prints i. Output: 123."},
  {id:"cm7",question:"What is printed?\n\nint i=1;\nwhile(i<=3){\n  System.out.print(i);\n  i++;\n}",choices:["123","321","111","Error"],answer:0,explanation:"i starts at 1. Condition 1<=3 is true, prints 1, increments. Repeats for 2 and 3. Output: 123."},
  {id:"cm8",question:"What is printed?\n\nint i=1;\ndo{\n  System.out.print(i);\n  i++;\n}while(i<=3);",choices:["123","321","1","Error"],answer:0,explanation:"do-while runs body first, then checks condition. Prints 1, 2, 3 before condition becomes false. Output: 123."},
  {id:"cm9",question:"What happens if the loop condition never becomes false?",choices:["Program stops","Infinite loop occurs","Compiler error","Runtime exception"],answer:1,explanation:"An infinite loop occurs when the condition always stays true. The loop never stops running."},
  {id:"cm10",question:"What is printed?\n\nfor(int i=0;i<3;i++){\n  System.out.print(\"*\");\n}",choices:["***","**","*","Error"],answer:0,explanation:"Loop runs for i=0,1,2 — three iterations. Each prints *. Output: ***."},
  {id:"cm11",question:"What is printed?\n\nfor(int i=5;i>=3;i--){\n  System.out.print(i);\n}",choices:["543","345","53","Error"],answer:0,explanation:"Loop starts at 5 and decreases. Prints 5, 4, 3. Output: 543."},
  {id:"cm12",question:"What is printed?\n\nint i=0;\nwhile(i<3){\n  System.out.print(\"A\");\n  i++;\n}",choices:["AAA","AA","A","Error"],answer:0,explanation:"Loop runs for i=0,1,2 — three iterations, each printing A. Output: AAA."},
  {id:"cm13",question:"Which statement skips the rest of the current loop iteration?",choices:["break","continue","exit","skip"],answer:1,explanation:"continue skips remaining statements in the current iteration and jumps to the next one."},
  {id:"cm14",question:"What is printed?\n\nfor(int i=1;i<=5;i+=2){\n  System.out.print(i);\n}",choices:["135","12345","15","Error"],answer:0,explanation:"i increases by 2 each time: 1, 3, 5. Output: 135."},
  {id:"cm15",question:"What is printed?\n\nfor(int i=1;i<=3;i++){\n  if(i==2) break;\n  System.out.print(i);\n}",choices:["12","1","123","Error"],answer:1,explanation:"When i=2, break stops the loop. Only i=1 is printed before the break. Output: 1."},
  // W7 — Nested Loops
  {id:"cm16",question:"What is a nested loop?",choices:["A loop that runs forever","A loop placed inside another loop","Two loops in different classes","A loop that runs twice"],answer:1,explanation:"A nested loop means one loop is written inside another. The outer loop controls how many times the inner loop executes."},
  {id:"cm17",question:"In nested loops, which loop starts execution first?",choices:["Inner loop","Outer loop","Both at the same time","Java chooses randomly"],answer:1,explanation:"Execution always begins with the outer loop. The inner loop runs completely for each outer iteration."},
  {id:"cm18",question:"How many times will the inner loop run?\n\nfor(int i=1;i<=4;i++){\n  for(int j=1;j<=3;j++){\n    System.out.print(\"*\");\n  }\n}",choices:["4","3","7","12"],answer:3,explanation:"Outer runs 4 times, inner runs 3 times per outer iteration. Total: 4 × 3 = 12."},
  {id:"cm19",question:"What is the output?\n\nfor(int i=1;i<=2;i++){\n  for(int j=1;j<=2;j++){\n    System.out.print(\"*\");\n  }\n}",choices:["**","****","******","***"],answer:1,explanation:"2 × 2 = 4 stars. Output: ****."},
  {id:"cm20",question:"What is the output?\n\nfor(int i=1;i<=3;i++){\n  for(int j=1;j<=2;j++){\n    System.out.print(j);\n  }\n}",choices:["123123","121212","111222","123"],answer:1,explanation:"Inner loop prints j (1 to 2) each time. Outer runs 3 times: 12, 12, 12. Output: 121212."},
  {id:"cm21",question:"What is the output?\n\nfor(int i=1;i<=3;i++){\n  for(int j=1;j<=3;j++){\n    System.out.print(i);\n  }\n}",choices:["123123123","111222333","123","321321321"],answer:1,explanation:"Inner loop prints i three times per outer iteration. i=1→111, i=2→222, i=3→333. Output: 111222333."},
  {id:"cm22",question:"What is the output?\n\nfor(int i=1;i<=3;i++){\n  for(int j=1;j<=3;j++){\n    System.out.print(j);\n  }\n}",choices:["123123123","111222333","321321321","123"],answer:0,explanation:"Inner loop prints j (1 to 3) each outer iteration. Outer runs 3 times: 123, 123, 123. Output: 123123123."},
  {id:"cm23",question:"What does break do inside a nested loop?",choices:["Stops both loops","Stops only the inner loop","Stops the outer loop","Restarts the loop"],answer:1,explanation:"break only exits the loop it is directly inside — typically the inner loop."},
  {id:"cm24",question:"If the outer loop runs 5 times and inner runs 4 times, total executions are:",choices:["9","20","10","25"],answer:1,explanation:"Total = outer × inner = 5 × 4 = 20."},
  {id:"cm25",question:"Which variable normally represents the row index?",choices:["j","i","x","z"],answer:1,explanation:"By convention, i is used for rows (outer loop) and j for columns (inner loop)."},
  // W8 — Methods
  {id:"cm26",question:"What is a method in Java?",choices:["A variable used to store numbers","A block of code that performs a specific task","A loop that repeats code","A conditional statement"],answer:1,explanation:"A method is a reusable block of code that performs a specific task. Instead of rewriting code, define it once and call it as needed."},
  {id:"cm27",question:"Which keyword indicates that a method does not return a value?",choices:["static","void","return","int"],answer:1,explanation:"void means the method performs an action but does not return any value."},
  {id:"cm28",question:"What is printed?\n\nstatic void hello(){\n  System.out.println(\"Hello\");\n}\npublic static void main(String[] args){\n  hello();\n}",choices:["hello","Hello","Nothing","Error"],answer:1,explanation:"main calls hello(), which prints Hello."},
  {id:"cm29",question:"What is printed?\n\nstatic int square(int x){\n  return x*x;\n}\npublic static void main(String[] args){\n  System.out.println(square(4));\n}",choices:["8","16","4","Error"],answer:1,explanation:"square(4) returns 4×4=16."},
  {id:"cm30",question:"What is a parameter?",choices:["The output of a method","A variable that receives input to a method","A loop inside a method","A class variable"],answer:1,explanation:"A parameter is a variable in the method definition that receives values when the method is called."},
  {id:"cm31",question:"What is printed?\n\nstatic int add(int a,int b){\n  return a+b;\n}\npublic static void main(String[] args){\n  System.out.println(add(3,5));\n}",choices:["8","35","15","Error"],answer:0,explanation:"add(3,5) returns 3+5=8."},
  {id:"cm32",question:"What does the return statement do?",choices:["Prints the value","Sends a value back to the calling method","Starts a loop","Declares a variable"],answer:1,explanation:"return sends a result back to where the method was called, then the method stops."},
  {id:"cm33",question:"What is printed?\n\nstatic int add(int a,int b){\n  return a+b;\n}\npublic static void main(String[] args){\n  System.out.println(add(2,3)+add(4,5));\n}",choices:["14","23","9","Error"],answer:0,explanation:"add(2,3)=5, add(4,5)=9. 5+9=14."},
  {id:"cm34",question:"Which keyword defines a method belonging to the class rather than objects?",choices:["public","static","final","private"],answer:1,explanation:"A static method belongs to the class and can be called without creating an object."},
  {id:"cm35",question:"How many parameters does this method have?\n\nstatic int add(int a,int b,int c)",choices:["1","2","3","4"],answer:2,explanation:"There are three parameters: a, b, and c."},
  // W9 — User-Defined Methods
  {id:"cm36",question:"What is a user-defined method?",choices:["A method built into Java","A method created by the programmer","A system command","A loop structure"],answer:1,explanation:"A user-defined method is written by the programmer, not provided by Java's built-in libraries."},
  {id:"cm37",question:"What is method overloading?",choices:["A method returning multiple values","Multiple methods with the same name but different parameters","A loop inside a method","A recursive call"],answer:1,explanation:"Method overloading allows multiple methods with the same name but different parameter lists."},
  {id:"cm38",question:"Which keyword sends a value back from a method?",choices:["static","return","void","call"],answer:1,explanation:"The return statement ends the method and sends a result back to the caller."},
  {id:"cm39",question:"What happens when a method finishes executing?",choices:["Program stops","Control returns to the caller","Loop starts","Variables disappear"],answer:1,explanation:"After finishing execution, the program returns to the line where the method was called."},
  {id:"cm40",question:"What is printed?\n\nstatic void print(){\n  System.out.print(\"Java \");\n}\npublic static void main(String[] args){\n  print();\n  print();\n}",choices:["Java","Java Java","JavaJava","Error"],answer:1,explanation:"print() outputs 'Java ' each call. Called twice: Java Java."},
  // W10 — Recursion
  {id:"cm41",question:"What is recursion?",choices:["A loop inside another loop","A method calling itself","A method returning multiple values","A method with parameters"],answer:1,explanation:"Recursion occurs when a method calls itself. The problem is broken into smaller pieces until a base case is reached."},
  {id:"cm42",question:"What is the base case in recursion?",choices:["The first method call","The condition that stops recursion","The last parameter","A loop condition"],answer:1,explanation:"The base case prevents infinite recursion. When it becomes true, the method stops calling itself."},
  {id:"cm43",question:"What happens if recursion has no base case?",choices:["The program runs normally","Recursion stops automatically","The program causes a stack overflow error","Java converts it to a loop"],answer:2,explanation:"Without a stopping condition, recursive calls continue until memory runs out, causing a StackOverflowError."},
  {id:"cm44",question:"What is the output?\n\nstatic void count(int n){\n  if(n==0) return;\n  System.out.print(n+\" \");\n  count(n-1);\n}\n// called with count(3)",choices:["1 2 3","3 2 1","3 3 3","Error"],answer:1,explanation:"count(3) prints 3, then calls count(2) which prints 2, then count(1) prints 1, count(0) stops. Output: 3 2 1."},
  {id:"cm45",question:"What is the output?\n\nstatic int sum(int n){\n  if(n==1) return 1;\n  return n+sum(n-1);\n}\n// sum(3)",choices:["3","5","6","9"],answer:2,explanation:"sum(3)=3+sum(2)=3+2+sum(1)=3+2+1=6."},
  {id:"cm46",question:"What is the output?\n\nstatic int fact(int n){\n  if(n==1) return 1;\n  return n*fact(n-1);\n}\n// fact(4)",choices:["10","16","24","12"],answer:2,explanation:"fact(4)=4×3×2×1=24."},
  {id:"cm47",question:"Which data structure manages recursive method calls?",choices:["Queue","Stack","Array","List"],answer:1,explanation:"Each recursive call is placed on the call stack. When a method finishes, it is removed from the stack."},
  {id:"cm48",question:"What is the output?\n\nstatic void print(int n){\n  if(n==0) return;\n  print(n-1);\n  System.out.print(n+\" \");\n}\n// print(3)",choices:["3 2 1","1 2 3","3 3 3","Error"],answer:1,explanation:"Recursive calls go down first (print(0) base), then print during unwinding: 1 2 3."},
  {id:"cm49",question:"Which of the following problems is commonly solved with recursion?",choices:["Factorial","Fibonacci sequence","Tree traversal","All of the above"],answer:3,explanation:"Recursion is useful for factorial, Fibonacci, tree traversal — problems that break into smaller versions of themselves."},
  {id:"cm50",question:"Which class stores both date and time in Java?",choices:["LocalDate","LocalTime","LocalDateTime","Date"],answer:2,explanation:"LocalDateTime combines both date and time information."},
];

const HCI_PRELIMS_FC = [
  {id:"hfc1",front:"What does HCI stand for?",back:"Human-Computer Interaction — the study of how people interact with computers and digital systems."},
  {id:"hfc2",front:"What is the main goal of HCI?",back:"To improve interaction between humans and computers — making systems easy, efficient, and enjoyable to use."},
  {id:"hfc3",front:"What is usability?",back:"How easy and effective it is for users to interact with a system. Measured by learnability, efficiency, memorability, errors, and satisfaction."},
  {id:"hfc4",front:"What is user-centered design?",back:"A design approach where systems are built around real user needs, goals, and abilities — not just technical requirements."},
  {id:"hfc5",front:"What is a UI (User Interface)?",back:"The visual layer users interact with directly — buttons, icons, menus, and layouts."},
  {id:"hfc6",front:"What is UX (User Experience)?",back:"How a user feels when using a system — the overall experience of interacting with an interface."},
  {id:"hfc7",front:"What is an interface?",back:"The point where users interact with a system — includes all buttons, menus, icons, and interactive elements."},
  {id:"hfc8",front:"Why is HCI considered multidisciplinary?",back:"Because it combines Psychology, Design, Computer Science, Ergonomics, and Sociology to understand and improve human-system interaction."},
  {id:"hfc9",front:"What does Psychology contribute to HCI?",back:"It explains how humans think, perceive, remember, and make decisions — fundamental to designing usable systems."},
  {id:"hfc10",front:"What does Ergonomics focus on in HCI?",back:"Physical comfort and usability — e.g., large buttons on medical apps for easy use."},
  {id:"hfc11",front:"What is cognitive load?",back:"The mental effort required to complete a task. High cognitive load leads to more errors and slower performance."},
  {id:"hfc12",front:"What is short-term (working) memory?",back:"Temporary memory that can hold about 7±2 items at a time. Information fades quickly unless actively maintained."},
  {id:"hfc13",front:"What is long-term memory?",back:"Permanent memory that stores learned knowledge, skills, and patterns — like knowing how to ride a bike."},
  {id:"hfc14",front:"Why should interfaces support recognition over recall?",back:"Recognition requires less mental effort — users find it easier to pick from visible options than to remember commands from nothing."},
  {id:"hfc15",front:"What is chunking in HCI?",back:"Breaking information into smaller, manageable pieces to reduce cognitive load — like splitting long forms into steps."},
  {id:"hfc16",front:"What is visual hierarchy?",back:"The arrangement of elements to guide the user's eye to the most important content first."},
  {id:"hfc17",front:"What are Gestalt principles?",back:"Principles explaining how humans naturally group and interpret visual elements — Proximity, Similarity, Closure, Continuity, Figure/Ground, Common Fate, Symmetry."},
  {id:"hfc18",front:"Gestalt: Proximity",back:"Objects placed near each other are perceived as a group — like buttons grouped together."},
  {id:"hfc19",front:"Gestalt: Similarity",back:"Objects that look alike (same color, shape, size) are perceived as belonging together."},
  {id:"hfc20",front:"Gestalt: Closure",back:"The mind fills in missing visual information — a circle with gaps still looks like a circle."},
  {id:"hfc21",front:"Gestalt: Continuity",back:"The eye naturally follows smooth lines and curves rather than abrupt changes in direction."},
  {id:"hfc22",front:"Gestalt: Figure/Ground",back:"The mind separates visual elements into foreground (figure) and background (ground)."},
  {id:"hfc23",front:"Gestalt: Common Fate",back:"Elements moving in the same direction are perceived as a group."},
  {id:"hfc24",front:"What is affordance (Don Norman)?",back:"The possible actions a user perceives they can perform — a button that looks clickable has affordance."},
  {id:"hfc25",front:"What are signifiers?",back:"Visual cues that show where and how to interact — arrows, icons, labels, and underlined text are examples."},
  {id:"hfc26",front:"What is feedback in interface design?",back:"The system's response after a user action — e.g., a message saying 'File uploaded successfully'."},
  {id:"hfc27",front:"What is mapping in interface design?",back:"The relationship between controls and their effects — stove knobs matching burner positions is natural mapping."},
  {id:"hfc28",front:"What are constraints in interface design?",back:"Limits that restrict user actions to prevent errors — e.g., a USB plug that only fits one way."},
  {id:"hfc29",front:"What are the three types of constraints?",back:"Physical (shape/form), Logical (system logic prevents invalid actions), Cultural (learned conventions like red = stop)."},
  {id:"hfc30",front:"What is error prevention?",back:"Designing the system to predict and stop mistakes before they happen — e.g., confirmation dialogs before deleting."},
  {id:"hfc31",front:"What are smart defaults?",back:"Pre-filled recommended options that reduce user effort — like a saved shipping address in a shopping app."},
  {id:"hfc32",front:"What is real-time validation?",back:"Checking user input immediately as they type — a password strength indicator is an example."},
  {id:"hfc33",front:"Knowledge in the world vs. knowledge in the head?",back:"Knowledge in the world: visible in the interface (labels, icons). Knowledge in the head: must be memorized. Good design favors the world."},
  {id:"hfc34",front:"Don Norman's core philosophy?",back:"When users make errors, it is a design failure — not a user failure. Good design prevents mistakes."},
  {id:"hfc35",front:"Why do users make mistakes?",back:"Due to limited attention, working memory capacity, and stress — not incompetence. It is the designer's responsibility to prevent errors."},
];

const HCI_MIDTERMS_FC = [
  {id:"hfc_m1",front:"What is the main goal of HCI evaluation?",back:"To determine whether users can effectively interact with a system — checking that a program is not just functional but also usable."},
  {id:"hfc_m2",front:"Utility vs. Usability — what's the difference?",back:"Utility = what a system can do (its features). Usability = how easily users can use those features. Both together = usefulness."},
  {id:"hfc_m3",front:"What are the three stages of the evaluation lifecycle?",back:"Discovery (pre-design), Prototyping (mid-design), Monitoring (post-launch)."},
  {id:"hfc_m4",front:"What are the three pillars of HCI evaluation?",back:"1. User-based — observing real users. 2. Expert-based — heuristic inspection. 3. System-based — logs and usage data."},
  {id:"hfc_m5",front:"What is user-based evaluation?",back:"Observing actual people using the system to get the most realistic insights into real user behavior."},
  {id:"hfc_m6",front:"What is expert-based evaluation?",back:"Usability experts inspect an interface using design principles and heuristics to identify problems quickly."},
  {id:"hfc_m7",front:"What is system-based evaluation?",back:"Collecting usage data (logs, heatmaps, analytics) to analyze where problems occur — but cannot explain why they occur."},
  {id:"hfc_m8",front:"What are the 5 components of usability?",back:"Learnability, Efficiency, Memorability, Errors, Satisfaction."},
  {id:"hfc_m9",front:"Learnability",back:"How easily first-time users can accomplish tasks with the system."},
  {id:"hfc_m10",front:"Efficiency",back:"How quickly experienced users can perform tasks after learning the system."},
  {id:"hfc_m11",front:"Memorability",back:"How well users remember how to use the system after a period of not using it — preventing the need to relearn."},
  {id:"hfc_m12",front:"Errors (usability component)",back:"The frequency, severity, and recovery difficulty of mistakes users make while interacting with the system."},
  {id:"hfc_m13",front:"Satisfaction (usability component)",back:"How pleasant and enjoyable users find the interaction with the system."},
  {id:"hfc_m14",front:"What is heuristic evaluation?",back:"A usability inspection method where 3–5 experts individually review an interface against usability heuristics, then combine findings."},
  {id:"hfc_m15",front:"Nielsen's 10 Heuristics — #1",back:"Visibility of System Status: always keep users informed about what is happening."},
  {id:"hfc_m16",front:"Nielsen's 10 Heuristics — #2",back:"Match Between System and Real World: use the user's language, not technical jargon."},
  {id:"hfc_m17",front:"Nielsen's 10 Heuristics — #3",back:"User Control and Freedom: provide an easy exit from unwanted states — undo and redo."},
  {id:"hfc_m18",front:"Nielsen's 10 Heuristics — #4",back:"Consistency and Standards: follow familiar conventions — users expect systems to work like others they know."},
  {id:"hfc_m19",front:"Nielsen's 10 Heuristics — #5",back:"Error Prevention: design to eliminate opportunities for mistakes before they happen."},
  {id:"hfc_m20",front:"Nielsen's 10 Heuristics — #6",back:"Recognition Rather Than Recall: show options visibly — users shouldn't have to remember information."},
  {id:"hfc_m21",front:"Nielsen's 10 Heuristics — #7",back:"Flexibility and Efficiency of Use: shortcuts and accelerators let expert users work faster."},
  {id:"hfc_m22",front:"Nielsen's 10 Heuristics — #8",back:"Aesthetic and Minimalist Design: remove unnecessary elements — every extra piece competes for attention."},
  {id:"hfc_m23",front:"Nielsen's 10 Heuristics — #9",back:"Help Users Recognize, Diagnose, and Recover from Errors: error messages should explain the problem and suggest a solution."},
  {id:"hfc_m24",front:"Nielsen's 10 Heuristics — #10",back:"Help and Documentation: easy-to-search help system focused on the user's task."},
  {id:"hfc_m25",front:"Fitts's Law",back:"The time to reach a target depends on its size and distance — larger and closer targets are faster to click."},
  {id:"hfc_m26",front:"Jakob's Law",back:"Users spend most of their time on other sites, so they expect your site to work similarly to those they already know."},
  {id:"hfc_m27",front:"What is a visibility issue?",back:"When controls are hidden or buried in menus — users cannot see what actions are available to them."},
  {id:"hfc_m28",front:"What is a feedback failure?",back:"When a system doesn't confirm or respond to a user's action — the user doesn't know if their action was registered."},
  {id:"hfc_m29",front:"What is a mapping problem?",back:"When controls don't intuitively correspond to their effects — causing confusion about what each control does."},
  {id:"hfc_m30",front:"What is inconsistency in interface design?",back:"When rules, behaviors, or layouts change across screens without reason — violates user expectations built from other screens."},
  {id:"hfc_m31",front:"Why is usability critical for business websites?",back:"Poor usability drives customers away — good usability keeps users engaged and directly increases sales and conversions."},
  {id:"hfc_m32",front:"Why is usability critical for employee tools?",back:"Poorly designed tools waste time, increase errors, and raise operational costs — reducing overall productivity."},
  {id:"hfc_m33",front:"What is the ultimate goal of evaluation in HCI?",back:"To align the system design with how users think and work — making interaction natural, intuitive, and error-free."},
];

const COMPROG_MIDTERMS_FC = [
  {id:"cmfc1",front:"What is a loop?",back:"A programming structure that allows the same block of code to execute repeatedly as long as a condition remains true."},
  {id:"cmfc2",front:"while loop",back:"A pre-test loop — checks the condition before each execution. If false at the start, the body never runs."},
  {id:"cmfc3",front:"do-while loop",back:"A post-test loop — executes the body first, then checks the condition. The body always runs at least once."},
  {id:"cmfc4",front:"for loop",back:"Best when the number of iterations is known. Has initialization, condition, and update all in one line: for(init; condition; update)."},
  {id:"cmfc5",front:"break vs. continue",back:"break: immediately exits the loop. continue: skips the rest of the current iteration and jumps to the next one."},
  {id:"cmfc6",front:"What is an infinite loop?",back:"A loop where the condition never becomes false — the loop runs forever, freezing the program."},
  {id:"cmfc7",front:"What is a nested loop?",back:"A loop placed inside another loop. The inner loop runs completely for each iteration of the outer loop."},
  {id:"cmfc8",front:"How to calculate total iterations of nested loops?",back:"Total = outer iterations × inner iterations. e.g., outer runs 4×, inner runs 3× → 4 × 3 = 12 total."},
  {id:"cmfc9",front:"Convention: i vs. j in nested loops",back:"By convention, i is used for rows (outer loop) and j is used for columns (inner loop)."},
  {id:"cmfc10",front:"What is a method in Java?",back:"A reusable, named block of code that performs a specific task. Define once, call as needed."},
  {id:"cmfc11",front:"What does void mean in a method?",back:"The method performs an action but does not return any value to the caller."},
  {id:"cmfc12",front:"What is a parameter?",back:"A variable in a method definition that receives an input value when the method is called."},
  {id:"cmfc13",front:"What does the return statement do?",back:"Sends a result value back to wherever the method was called, then the method stops executing."},
  {id:"cmfc14",front:"What is method overloading?",back:"Multiple methods with the same name but different parameter lists — Java decides which to call based on arguments passed."},
  {id:"cmfc15",front:"What is a static method?",back:"A method that belongs to the class itself, not to an instance. Can be called without creating an object."},
  {id:"cmfc16",front:"What is recursion?",back:"When a method calls itself. The problem is broken into smaller pieces until a base case is reached."},
  {id:"cmfc17",front:"What is the base case in recursion?",back:"The stopping condition that prevents infinite recursion. When it's true, the method stops calling itself."},
  {id:"cmfc18",front:"What happens with no base case in recursion?",back:"Recursive calls continue until memory runs out, causing a StackOverflowError."},
  {id:"cmfc19",front:"factorial(4) using recursion",back:"4 × 3 × 2 × 1 = 24. Each call: n × factorial(n-1), base case factorial(1) = 1."},
  {id:"cmfc20",front:"Call stack in recursion",back:"Each recursive call is pushed onto the call stack. When a call finishes, it is popped off and control returns to the previous call."},

  {id:"cmfc22",front:"Array index — first and last element",back:"First element is at index 0. Last element is at index length-1. Accessing outside this range causes ArrayIndexOutOfBoundsException."},
  {id:"cmfc23",front:"How to declare and initialize an array",back:"int[] arr = new int[5]; or int[] arr = {1, 2, 3, 4, 5};"},
  {id:"cmfc24",front:"arr.length",back:"Returns the total number of elements in the array — not the last index (which is length-1)."},
  {id:"cmfc25",front:"What is LocalDateTime in Java?",back:"A class that combines both date and time information — LocalDate (date only) and LocalTime (time only) are alternatives."},
];

const HCI_PRELIMS_MCQ = [
  // Lecture 1 — Intro to HCI
  {id:"hci1",question:"What does HCI stand for?",choices:["Human Computer Integration","Human Computer Interaction","Hardware Computer Interface","Human Control Interface"],answer:1,explanation:"HCI stands for Human-Computer Interaction — it studies how people interact with computers and digital systems."},
  {id:"hci2",question:"What is the main goal of Human-Computer Interaction?",choices:["Make computers faster","Improve interaction between humans and computers","Replace humans with machines","Increase hardware size"],answer:1,explanation:"HCI focuses on making systems easy, efficient, and enjoyable to use."},
  {id:"hci3",question:"Which of the following is an example of HCI?",choices:["Writing code only","Designing a website menu","Building computer hardware","Installing a CPU"],answer:1,explanation:"HCI focuses on user experience and interaction design. A website with clear navigation menus is a result of HCI design."},
  {id:"hci4",question:"Why is usability important in HCI?",choices:["To make software complicated","To make systems easy to use","To increase file sizes","To slow down programs"],answer:1,explanation:"Usability ensures systems are easy to learn and efficient. Google search is a great example: type, press search, results appear."},
  {id:"hci5",question:"Which device represents an example of HCI?",choices:["Keyboard","Mouse","Touchscreen","All of the above"],answer:3,explanation:"All these devices allow humans to interact with computers — keyboard, mouse, and touchscreen are all HCI input devices."},
  {id:"hci6",question:"Which factor is most important in HCI design?",choices:["The computer's color","The user's needs","The CPU speed","The computer brand"],answer:1,explanation:"HCI focuses on user-centered design — systems are designed around user needs, not technical specs."},
  {id:"hci7",question:"Which field strongly contributes to HCI?",choices:["Psychology","Design","Computer Science","All of the above"],answer:3,explanation:"HCI combines multiple disciplines: psychology (understanding thinking), design (interface layout), and computer science (system behavior)."},
  {id:"hci8",question:"Which interface is most common in modern HCI?",choices:["Touch interfaces","Punch cards","Switch boards","Mechanical controls"],answer:0,explanation:"Touchscreens dominate modern interfaces — smartphones and tablets are prime examples."},
  {id:"hci9",question:"What is an interface?",choices:["The hardware only","The point where users interact with a system","The CPU unit","The operating system"],answer:1,explanation:"An interface allows users to interact with software — this includes buttons, icons, and menus on an app."},
  {id:"hci10",question:"Which of the following improves usability?",choices:["Clear buttons","Confusing layouts","Hidden options","Long instructions"],answer:0,explanation:"Clear buttons help users easily understand how to interact with a system."},
  {id:"hci11",question:"What is user-centered design?",choices:["Designing systems for developers","Designing systems based on user needs","Designing systems for machines","Designing systems randomly"],answer:1,explanation:"User-centered design focuses on what users need and expect — like a shopping website designed for quick checkout."},
  {id:"hci12",question:"Which of these systems relies heavily on HCI?",choices:["ATM machines","Mobile apps","Websites","All of the above"],answer:3,explanation:"All digital systems involve human-computer interaction — ATMs, mobile apps, and websites all apply HCI principles."},
  {id:"hci13",question:"What does good HCI design reduce?",choices:["Computer memory","User errors","Internet speed","Screen brightness"],answer:1,explanation:"Good design prevents mistakes — for example, confirming before deleting a file."},
  {id:"hci14",question:"Which of the following improves user experience?",choices:["Clear navigation","Confusing instructions","Hidden menus","Random layout"],answer:0,explanation:"Clear navigation helps users easily understand where to go, like a top navigation bar on websites."},
  {id:"hci15",question:"What does UX stand for?",choices:["User Experience","User Execution","User Extension","User Example"],answer:0,explanation:"UX refers to how users feel when using a system — a smooth shopping experience is an example of good UX."},
  {id:"hci16",question:"What does UI mean?",choices:["User Interface","User Integration","Universal Interface","User Interaction"],answer:0,explanation:"UI stands for User Interface — the visual elements users interact with directly."},
  {id:"hci17",question:"Which of the following is a poor interface design?",choices:["Clear labels","Hidden buttons","Simple layout","Large icons"],answer:1,explanation:"Hidden buttons make it hard for users to find what they need, which is poor interface design."},
  {id:"hci18",question:"What makes an interface intuitive?",choices:["Users need instructions","Users understand it immediately","It requires training","It has complex features"],answer:1,explanation:"An intuitive interface is one users can understand and use immediately without needing instructions."},
  {id:"hci19",question:"Which system is an example of interactive technology?",choices:["Mobile banking app","ATM","Smart TV","All of the above"],answer:3,explanation:"All of these — mobile banking, ATM, and smart TV — are interactive technology systems."},
  {id:"hci20",question:"Why is HCI important today?",choices:["Technology is everywhere","People rely on digital systems daily","Systems must be easy to use","All of the above"],answer:3,explanation:"HCI is critical because technology is everywhere, people rely on digital systems daily, and those systems must be easy to use."},
  // Lecture 2 — Multidisciplinary HCI
  {id:"hci21",question:"Why is HCI considered multidisciplinary?",choices:["It uses only programming","It combines multiple fields","It focuses on hardware only","It focuses only on design"],answer:1,explanation:"HCI combines psychology, design, computer science, ergonomics, and sociology."},
  {id:"hci22",question:"Which field studies how users think and remember?",choices:["Psychology","Engineering","Mathematics","Networking"],answer:0,explanation:"Psychology studies human cognition, memory, and behavior — essential for understanding how users interact with systems."},
  {id:"hci23",question:"Which field helps organize layout and visual elements?",choices:["Design","Chemistry","Accounting","Physics"],answer:0,explanation:"Design disciplines help create organized, visually clear layouts and interfaces."},
  {id:"hci24",question:"Which discipline focuses on system performance and behavior?",choices:["Sociology","Computer Science","Design","Psychology"],answer:1,explanation:"Computer Science provides the technical foundation for system behavior and performance."},
  {id:"hci25",question:"What does ergonomics focus on?",choices:["Computer programming","Physical comfort and usability","Network speed","Data analysis"],answer:1,explanation:"Ergonomics ensures physical comfort and usability — for example, large buttons on medical apps for easy use."},
  {id:"hci26",question:"Which discipline studies social impact and group behavior?",choices:["Sociology","Programming","Physics","Mathematics"],answer:0,explanation:"Sociology studies how people interact in groups and how technology affects society."},
  {id:"hci27",question:"Why is psychology important in HCI?",choices:["It explains how humans think","It improves computer memory","It speeds up processors","It creates software"],answer:0,explanation:"Psychology explains how humans think, perceive, and make decisions — fundamental to designing usable systems."},
  {id:"hci28",question:"Why do users make mistakes in systems?",choices:["Unlimited memory","Limited attention","Too much time","Perfect memory"],answer:1,explanation:"Mistakes occur due to limited attention, working memory, and stress — not user incompetence."},
  {id:"hci29",question:"What does cognitive load mean?",choices:["Physical effort","Mental effort required to complete a task","Computer storage","Internet speed"],answer:1,explanation:"Cognitive load is the mental effort needed to complete a task. High cognitive load leads to errors."},
  {id:"hci30",question:"Which sense do humans rely on most when interacting with systems?",choices:["Visual","Smell","Taste","Hearing"],answer:0,explanation:"Humans rely primarily on vision when interacting with digital systems."},
  {id:"hci31",question:"Which of the following is an input method?",choices:["Seeing an icon","Clicking a button","Hearing a sound","All of the above"],answer:3,explanation:"Input can be visual (seeing), physical (clicking), or auditory (hearing) — all are valid input methods in HCI."},
  {id:"hci32",question:"In information processing, input means:",choices:["System response","Receiving information","User decision","Error message"],answer:1,explanation:"Input is the stage where the user receives information from the environment or system."},
  {id:"hci33",question:"Which stage involves user decision making?",choices:["Input","Processing","Output","Storage"],answer:1,explanation:"Processing is when the user interprets information and decides what action to take."},
  {id:"hci34",question:"Which stage involves user actions?",choices:["Input","Processing","Output","Memory"],answer:2,explanation:"Output is the action stage — clicking, typing, swiping are all output actions from the user."},
  {id:"hci35",question:"Why do users prefer recognition over recall?",choices:["Recognition requires less memory","Recall is faster","Recall is easier","Recognition is slower"],answer:0,explanation:"Recognition requires less mental effort than recall — users find it easier to pick from visible options than to remember commands."},
  {id:"hci36",question:"Which example shows poor interface design?",choices:["Clear labels","Long confusing forms","Simple menus","Visible buttons"],answer:1,explanation:"Long confusing forms increase cognitive load and frustrate users — a sign of poor interface design."},
  {id:"hci37",question:"Which method reduces cognitive load?",choices:["Chunking information","Long paragraphs","Hidden options","Random layout"],answer:0,explanation:"Chunking breaks information into manageable pieces — like breaking long forms into multiple steps."},
  {id:"hci38",question:"Why do mobile apps require special design?",choices:["Small screens","One-hand use","Distractions","All of the above"],answer:3,explanation:"Mobile design is challenged by small screens, one-hand use, and environmental distractions."},
  {id:"hci39",question:"What helps prevent user errors?",choices:["Clear feedback","Constraints","Minimal design","All of the above"],answer:3,explanation:"Error prevention uses clear feedback, logical constraints, and minimal clutter — all working together."},
  {id:"hci40",question:"Who is responsible for preventing user mistakes?",choices:["The user","The designer","The internet","The operating system"],answer:1,explanation:"Errors are design failures, not user failures. It is the designer's responsibility to prevent mistakes."},
  // Lecture 3 — Human Memory & Perception
  {id:"hci41",question:"What is the key limitation of human memory?",choices:["Unlimited storage","Short-term memory is small","Humans remember everything","Humans never forget"],answer:1,explanation:"Short-term (working) memory can only hold about 7±2 items at a time."},
  {id:"hci42",question:"Short-term memory is best described as:",choices:["Permanent storage","Temporary memory","Infinite memory","Physical memory"],answer:1,explanation:"Short-term memory is temporary — information fades quickly unless actively maintained."},
  {id:"hci43",question:"Which type of memory stores learned knowledge and patterns?",choices:["Short-term memory","Long-term memory","Temporary memory","Instant memory"],answer:1,explanation:"Long-term memory stores learned skills and knowledge — like remembering how to ride a bicycle."},
  {id:"hci44",question:"Why should interfaces support recognition instead of recall?",choices:["Recognition requires less mental effort","Recall is easier","Recognition is slower","Recall is automatic"],answer:0,explanation:"Recognition (seeing options) requires less mental effort than recall (remembering from nothing) — icons instead of memorized commands."},
  {id:"hci45",question:"Which example demonstrates recognition design?",choices:["Showing menu options","Asking users to memorize commands","Removing labels","Using hidden navigation"],answer:0,explanation:"Showing menu options lets users recognize their choices instead of having to recall them."},
  {id:"hci46",question:"What does perception mean in HCI?",choices:["How computers think","How users interpret what they see","Computer memory storage","Programming logic"],answer:1,explanation:"Perception is how users interpret and make sense of what they see on screen."},
  {id:"hci47",question:"Which factors influence perception?",choices:["Color","Size","Position","All of the above"],answer:3,explanation:"Color, size, and position all influence how users perceive and interpret visual elements."},
  {id:"hci48",question:"What is visual hierarchy?",choices:["Random layout","Showing important elements first","Removing important elements","Hiding information"],answer:1,explanation:"Visual hierarchy guides the user's eye to the most important content first."},
  {id:"hci49",question:"What do Gestalt principles explain?",choices:["Programming languages","How humans visually group elements","Internet speed","Hardware design"],answer:1,explanation:"Gestalt principles describe how humans naturally group, organize, and interpret visual elements."},
  {id:"hci50",question:"Which Gestalt principle groups objects close together?",choices:["Similarity","Proximity","Closure","Continuity"],answer:1,explanation:"Proximity: objects placed near each other are perceived as a group — like buttons placed close together."},
  {id:"hci51",question:"Which Gestalt principle groups objects that look alike?",choices:["Similarity","Proximity","Closure","Continuity"],answer:0,explanation:"Similarity: objects that look alike (same color, shape, size) are perceived as belonging together."},
  {id:"hci52",question:"What does the continuity principle mean?",choices:["People follow smooth lines or paths","Objects must be close together","Shapes must be identical","Objects must be large"],answer:0,explanation:"Continuity: the eye naturally follows smooth lines and curves rather than abrupt changes in direction."},
  {id:"hci53",question:"What is closure?",choices:["Completing missing visual information","Closing programs","Removing shapes","Ignoring shapes"],answer:0,explanation:"Closure: the mind fills in missing visual information — a circle with gaps still looks like a circle."},
  {id:"hci54",question:"Which principle separates foreground and background?",choices:["Proximity","Similarity","Figure/Ground","Closure"],answer:2,explanation:"Figure/Ground: the mind separates visual elements into foreground (figure) and background (ground)."},
  {id:"hci55",question:"Which principle groups moving elements together?",choices:["Common fate","Proximity","Closure","Continuity"],answer:0,explanation:"Common fate: elements moving in the same direction are perceived as a group."},
  {id:"hci56",question:"Which principle groups symmetrical elements?",choices:["Symmetry & Order","Similarity","Closure","Proximity"],answer:0,explanation:"Symmetry & Order: symmetrical layouts are perceived as organized and grouped together."},
  {id:"hci57",question:"Why is visual hierarchy important?",choices:["Helps users find information quickly","Makes systems slower","Increases confusion","Removes information"],answer:0,explanation:"Visual hierarchy guides users' attention so they find the most important information quickly."},
  {id:"hci58",question:"Why should designers consider perception?",choices:["Users interpret visuals differently","Users ignore visuals","Perception has no effect","Perception is irrelevant"],answer:0,explanation:"Users interpret visuals based on context, culture, and cognition — designers must account for these differences."},
  // Lecture 5 — Don Norman Design Principles
  {id:"hci59",question:"Who is Don Norman?",choices:["Software engineer","Cognitive scientist","Hardware designer","Network engineer"],answer:1,explanation:"Don Norman is a cognitive scientist best known for his work on user-centered design and The Design of Everyday Things."},
  {id:"hci60",question:"What is affordance?",choices:["System speed","Possible actions users can take","Memory storage","Data transfer"],answer:1,explanation:"Affordance refers to the possible actions a user perceives they can perform — a button looks clickable."},
  {id:"hci61",question:"What are signifiers?",choices:["Hidden features","Visual clues that show actions","Computer commands","Hardware signals"],answer:1,explanation:"Signifiers are visual cues that indicate where and how to interact — arrows, icons, and labels are examples."},
  {id:"hci62",question:"What is feedback?",choices:["User memory","System response after an action","System shutdown","System error"],answer:1,explanation:"Feedback is the system's response after a user action — a message saying 'File uploaded successfully' is feedback."},
  {id:"hci63",question:"What does mapping describe?",choices:["Internet routing","Relationship between controls and results","Data storage","Programming logic"],answer:1,explanation:"Mapping is the relationship between controls and their effects — stove knobs matching burner positions is natural mapping."},
  {id:"hci64",question:"What are constraints?",choices:["Unlimited user options","Limits that prevent incorrect actions","System errors","Hardware limitations"],answer:1,explanation:"Constraints limit user actions to prevent errors — they guide users toward correct behavior."},
  {id:"hci65",question:"Which is an example of physical constraint?",choices:["USB plug fits only one direction","Password limit","Color coding","Error message"],answer:0,explanation:"A USB plug that fits only one way is a physical constraint — the shape prevents incorrect insertion."},
  {id:"hci66",question:"Which constraint uses logic?",choices:["System prevents ordering more items than stock","USB port shape","Color of buttons","Icons"],answer:0,explanation:"A logical constraint uses system logic — like preventing ordering more items than available in stock."},
  {id:"hci67",question:"Which constraint uses culture?",choices:["Red = error","USB plug shape","Keyboard layout","Hardware design"],answer:0,explanation:"Cultural constraints use learned conventions — red meaning error or stop is a cultural constraint."},
  {id:"hci68",question:"What is the goal of error prevention?",choices:["Allow mistakes","Predict and prevent errors","Remove system functions","Hide controls"],answer:1,explanation:"Error prevention aims to predict potential mistakes and design the system to stop them before they happen."},
  {id:"hci69",question:"Which feature helps prevent accidental actions?",choices:["Confirmation step","Hidden menu","Long instructions","Random layout"],answer:0,explanation:"A confirmation step like 'Are you sure you want to delete this file?' prevents accidental actions."},
  {id:"hci70",question:"What are smart defaults?",choices:["Random settings","Automatic recommended options","Error messages","Hardware limits"],answer:1,explanation:"Smart defaults are pre-filled recommended options — like a default shipping address saved in a shopping app."},
  {id:"hci71",question:"What is real-time validation?",choices:["Checking input immediately","Saving data later","Ignoring errors","Delayed response"],answer:0,explanation:"Real-time validation checks input as the user types — a password strength indicator is an example."},
  {id:"hci72",question:"What is knowledge in the world?",choices:["Information visible in the interface","Information stored in memory","Hidden information","Internet data"],answer:0,explanation:"Knowledge in the world is information visible in the interface — labels, icons, and instructions users can see."},
  {id:"hci73",question:"What is knowledge in the head?",choices:["Information users must remember","Information displayed on screen","System storage","Server memory"],answer:0,explanation:"Knowledge in the head is information users must memorize — commands or codes not shown on screen."},
  {id:"hci74",question:"Why should designers minimize knowledge in the head?",choices:["Humans forget easily","Humans remember everything","Memory is unlimited","It slows computers"],answer:0,explanation:"Humans have limited working memory and forget easily — designs should show information rather than require memorization."},
  {id:"hci75",question:"Which of the following summarizes Don Norman's philosophy?",choices:["Blame users for mistakes","Blame design, not users","Ignore human behavior","Focus only on programming"],answer:1,explanation:"Don Norman's core principle: when users make errors, it is a design failure — good design prevents mistakes."},
];

      {id:"hci_m1",question:"What is the main goal of evaluation in Human-Computer Interaction?",choices:["To improve computer hardware","To determine whether users can effectively interact with a system","To increase programming speed","To reduce memory usage"],answer:1,explanation:"Evaluation in HCI focuses on how well humans can use a system, not just whether it functions technically. A program might run correctly but still fail if users cannot understand or operate it."},
      {id:"hci_m2",question:"Which statement best describes the difference between functionality and usability?",choices:["Functionality is more important than usability","A system can be usable but not functional","A system can be functional but unusable","They are exactly the same"],answer:2,explanation:"A system may contain all the necessary features (functional), but if users cannot easily operate those features, the system becomes unusable. Utility + usability = usefulness."},
      {id:"hci_m3",question:"Which of the following describes utility?",choices:["How easy a system is to learn","The number of features and functions a system provides","The emotional satisfaction users feel","The visual appearance of the system"],answer:1,explanation:"Utility refers to what the system can do — its features and capabilities. For example, an online store has utility if it allows users to search products, add items to cart, and make purchases."},
      {id:"hci_m4",question:"Which stage of the evaluation lifecycle occurs before design begins?",choices:["Monitoring","Discovery","Testing","Deployment"],answer:1,explanation:"The discovery stage happens during pre-design. Designers analyze user needs, context, and problems before creating solutions."},
      {id:"hci_m5",question:"Which stage of evaluation occurs during the design process?",choices:["Monitoring","Prototyping","Maintenance","Deployment"],answer:1,explanation:"Prototyping occurs during mid-design. Early interface versions are tested to discover usability problems before final implementation."},
      {id:"hci_m6",question:"Which stage evaluates systems after they are launched?",choices:["Monitoring","Discovery","Analysis","Simulation"],answer:0,explanation:"Monitoring happens after release. Designers collect real usage data and feedback to improve the product over time."},
      // Part 2 — Evaluation Approaches
      {id:"hci_m7",question:"How many main evaluation approaches (pillars) exist in HCI evaluation?",choices:["2","3","4","5"],answer:1,explanation:"The three pillars of evaluation are: (1) User-based, (2) Expert-based, and (3) System-based. Each provides different insights about usability."},
      {id:"hci_m8",question:"Which evaluation method involves observing real users performing real tasks?",choices:["Expert-based evaluation","User-based evaluation","System-based evaluation","Automated evaluation"],answer:1,explanation:"User-based evaluation observes actual people using the system. It provides the most realistic insights into user behavior."},
      {id:"hci_m9",question:"Which evaluation method uses usability experts to inspect an interface?",choices:["Expert-based inspection","System-based testing","User observation","Behavior tracking"],answer:0,explanation:"Expert evaluators analyze interfaces using design principles, heuristics, and usability guidelines."},
      {id:"hci_m10",question:"Which evaluation method relies on data such as logs or heatmaps?",choices:["User-based evaluation","Expert-based evaluation","System-based evaluation","Manual testing"],answer:2,explanation:"System-based evaluation collects large amounts of usage data to analyze where problems occur."},
      {id:"hci_m11",question:"What is a major limitation of system-based evaluation?",choices:["It cannot collect data","It cannot identify where problems occur","It cannot explain why problems occur","It cannot track users"],answer:2,explanation:"System-based evaluation shows where users struggle, but it usually cannot explain why they struggle."},
      // Part 3 — Usability
      {id:"hci_m12",question:"What is usability?",choices:["A programming method","A visual design technique","A measure of how easy a system is to use","A debugging process"],answer:2,explanation:"Usability evaluates how easy and effective it is for users to interact with a system."},
      {id:"hci_m13",question:"Which factor affects usability the most?",choices:["Programming language","Context of use","Screen resolution","Internet speed"],answer:1,explanation:"Usability depends heavily on user type, goals, and context. The same interface may work differently for experts vs beginners."},
      {id:"hci_m14",question:"Which usability component measures how quickly users learn the system?",choices:["Efficiency","Learnability","Memorability","Satisfaction"],answer:1,explanation:"Learnability determines how easy it is for first-time users to accomplish tasks."},
      {id:"hci_m15",question:"Which usability component measures task speed after learning?",choices:["Efficiency","Memorability","Learnability","Feedback"],answer:0,explanation:"Efficiency measures how quickly experienced users can perform tasks."},
      {id:"hci_m16",question:"Which usability component refers to remembering how to use the system after time away?",choices:["Efficiency","Memorability","Learnability","Errors"],answer:1,explanation:"Memorability ensures users do not need to relearn the interface after returning."},
      {id:"hci_m17",question:"Which usability component measures user mistakes and recovery?",choices:["Errors","Satisfaction","Efficiency","Memorability"],answer:0,explanation:"Error evaluation considers frequency, severity, and recovery difficulty."},
      {id:"hci_m18",question:"Which usability component measures how enjoyable the interface is?",choices:["Satisfaction","Learnability","Efficiency","Memorability"],answer:0,explanation:"Satisfaction measures how pleasant users find the interaction."},
      // Part 4 — Usability Design Principles
      {id:"hci_m19",question:"What is the purpose of constraints in interface design?",choices:["Increase user freedom","Limit actions to prevent errors","Improve graphics","Increase processing speed"],answer:1,explanation:"Constraints restrict possible actions so users cannot make invalid operations."},
      {id:"hci_m20",question:"What does feedback provide in a system?",choices:["Error correction","Information about user actions","Data storage","Faster performance"],answer:1,explanation:"Feedback informs users that the system received and processed their action."},
      {id:"hci_m21",question:"What does mapping refer to in interface design?",choices:["File storage","Matching controls with effects","Database structure","Coding structure"],answer:1,explanation:"Mapping ensures the relationship between actions and results is intuitive."},
      // Part 5 — Heuristic Evaluation
      {id:"hci_m22",question:"What is heuristic evaluation?",choices:["Automated bug detection","Usability inspection by experts","Code optimization","User testing method"],answer:1,explanation:"Experts inspect interfaces using usability heuristics to identify design issues quickly."},
      {id:"hci_m23",question:"Heuristic evaluation is usually conducted by how many experts?",choices:["1","3-5","10-20","50"],answer:1,explanation:"Typically 3–5 evaluators inspect the interface individually and combine findings."},
      {id:"hci_m24",question:"Which usability heuristic ensures systems keep users informed?",choices:["Visibility of system status","Minimalist design","Error prevention","Documentation"],answer:0,explanation:"Users should always understand what the system is doing."},
      {id:"hci_m25",question:"Which heuristic suggests interfaces should use real-world language?",choices:["Recognition rather than recall","Match between system and real world","Error recovery","Minimalism"],answer:1,explanation:"Interfaces should speak the user's language rather than technical jargon."},
      {id:"hci_m26",question:"Which heuristic provides an exit from unwanted states?",choices:["Error recovery","User control and freedom","Visibility","Efficiency"],answer:1,explanation:"Users should be able to undo actions or exit mistakes easily."},
      {id:"hci_m27",question:"Which heuristic ensures interfaces follow familiar standards?",choices:["Consistency and standards","Recognition rather than recall","Visibility","Mapping"],answer:0,explanation:"Users expect systems to behave similarly to others they already know."},
      {id:"hci_m28",question:"Which heuristic aims to prevent problems before they happen?",choices:["Error prevention","Recovery","Minimalist design","Feedback"],answer:0,explanation:"Design should eliminate opportunities for mistakes."},
      {id:"hci_m29",question:"Which heuristic reduces the need for users to remember information?",choices:["Recognition rather than recall","Mapping","Efficiency","Minimalism"],answer:0,explanation:"Users should recognize options rather than recall them from memory."},
      {id:"hci_m30",question:"Which heuristic allows experienced users to work faster?",choices:["Flexibility and efficiency of use","Visibility","Minimalism","Documentation"],answer:0,explanation:"Shortcuts and accelerators improve productivity for expert users."},
      // Part 6 — Remaining Heuristics
      {id:"hci_m31",question:"Which heuristic emphasizes simple design without unnecessary elements?",choices:["Aesthetic and minimalist design","Mapping","Recognition","Visibility"],answer:0,explanation:"Too much information increases cognitive load."},
      {id:"hci_m32",question:"Which heuristic helps users diagnose and recover from errors?",choices:["Error recovery","Feedback","Constraints","Mapping"],answer:0,explanation:"Error messages should clearly explain problems and solutions."},
      {id:"hci_m33",question:"Which heuristic ensures users can access help information when needed?",choices:["Documentation","Visibility","Recognition","Efficiency"],answer:0,explanation:"Help systems should be easy to search and focused on user tasks."},
      // Part 7 — Evaluation Metrics
      {id:"hci_m34",question:"Which usability metric measures how easily users learn the interface?",choices:["Learnability","Efficiency","Errors","Satisfaction"],answer:0,explanation:"Learnability measures how quickly new users can accomplish tasks on first use."},
      {id:"hci_m35",question:"Which metric measures speed of completing tasks?",choices:["Efficiency","Memorability","Errors","Satisfaction"],answer:0,explanation:"Efficiency measures how fast experienced users complete tasks."},
      {id:"hci_m36",question:"Which metric measures how many mistakes users make?",choices:["Errors","Learnability","Efficiency","Memorability"],answer:0,explanation:"Error metrics track frequency, severity, and recovery difficulty of mistakes."},
      {id:"hci_m37",question:"Which metric measures user emotional response?",choices:["Satisfaction","Efficiency","Errors","Learnability"],answer:0,explanation:"Satisfaction measures how pleasant and enjoyable users find the interaction."},
      // Part 8 — HCI Concepts
      {id:"hci_m38",question:"Which law states that larger targets are easier to click?",choices:["Moore's Law","Jakob's Law","Fitts's Law","Hick's Law"],answer:2,explanation:"Fitts's Law states that the time to reach a target depends on its size and distance — larger and closer targets are faster to click."},
      {id:"hci_m39",question:"Which law states users expect systems to work like others they know?",choices:["Jakob's Law","Newton's Law","Fitts's Law","Moore's Law"],answer:0,explanation:"Jakob's Law: users spend most of their time on other sites, so they expect your site to work similarly to those they already know."},
      {id:"hci_m40",question:"Which issue occurs when controls do not match their effects?",choices:["Visibility problem","Mapping problem","Feedback failure","Efficiency problem"],answer:1,explanation:"A mapping problem occurs when controls do not intuitively correspond to their effects, causing user confusion."},
      // Part 9 — Interface Problems
      {id:"hci_m41",question:"Hidden controls in menus are an example of:",choices:["Visibility issue","Efficiency issue","Error prevention","Feedback"],answer:0,explanation:"When controls are buried or hidden, users cannot see what actions are available — this is a visibility issue."},
      {id:"hci_m42",question:"Lack of confirmation after a user action is called:",choices:["Mapping problem","Feedback failure","Visibility issue","Error prevention"],answer:1,explanation:"When a system does not respond or confirm an action has been received, this is a feedback failure."},
      {id:"hci_m43",question:"Changing rules across screens creates:",choices:["Efficiency issue","Inconsistency","Visibility issue","Mapping issue"],answer:1,explanation:"When behavior differs across screens without reason, this creates inconsistency, violating user expectations."},

      {id:"hci_m44",question:"Why is usability important for business websites?",choices:["It improves code speed","It increases sales and conversions","It improves graphics","It reduces server load"],answer:1,explanation:"Poor usability drives customers away — good usability keeps users engaged and increases conversions and sales."},
      {id:"hci_m45",question:"If users cannot find products on a website, what happens?",choices:["They continue searching","They leave the website","They refresh the page","They contact support"],answer:1,explanation:"Users who cannot find what they need quickly will abandon the website and go elsewhere."},
      {id:"hci_m46",question:"Why is usability critical for employee tools?",choices:["It increases company branding","It reduces productivity","It reduces wasted time and cost","It improves aesthetics"],answer:2,explanation:"Poorly designed employee tools waste time, increase errors, and raise operational costs."},
      {id:"hci_m47",question:"What happens when cognitive load is too high?",choices:["Performance improves","Errors increase","Speed increases","Users memorize better"],answer:1,explanation:"Excessive cognitive load overwhelms working memory, causing users to make more mistakes and work less efficiently."},
      {id:"hci_m48",question:"Which design principle encourages actions naturally?",choices:["Affordance","Mapping","Visibility","Feedback"],answer:0,explanation:"Affordance describes how design properties suggest how an object should be used — a button that looks pressable encourages clicking."},

// ── Quiz Screen ───────────────────────────────────────────────────────────────
function QuizScreen({ subject, period, config, onBack }) {
  const { theme } = useTheme(); const mc=theme==="minecraft"; const isforms=theme==="forms";
  const subj=SUBJECTS[subject]; const pds=period==="Both"?["prelims","midterms"]:[period.toLowerCase()];
  let pool=[]; pds.forEach(p=>{if(subj[p])pool=[...pool,...subj[p].mcq];});
  const [questions]=useState(()=>[...pool].sort(()=>Math.random()-0.5).slice(0,config.count));
  const [current,setCurrent]=useState(0); const [answers,setAnswers]=useState({}); const [revealed,setRevealed]=useState({}); const [showResult,setShowResult]=useState(false);
  const q=questions[current]; const ua=answers[q.id]; const isRev=config.feedback==="immediate"&&revealed[q.id];
  const handleAns=idx=>{ if(isRev)return; setAnswers(p=>({...p,[q.id]:idx})); if(config.feedback==="immediate")setRevealed(p=>({...p,[q.id]:true})); };
  const score=questions.filter(q=>answers[q.id]===q.answer).length;
  const pct=Math.round(score/questions.length*100);

      <div className="slide-in" style={{maxWidth:620,margin:"0 auto",padding:"40px 20px"}}>

          <div style={{fontSize:mc?"4rem":"2.8rem",fontFamily:"var(--font)",fontWeight:"bold",color:sc}}>{score} / {questions.length}</div>
          <div style={{fontSize:mc?"1.3rem":"0.95rem",color:"var(--text-dim)"}}>{pct}% correct</div>
        </div>
        <Divider/>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginTop:16}}>
          {questions.map((q,i)=>{const ua=answers[q.id];const ok=ua===q.answer;return(
            <Panel key={q.id} accent={ok?"var(--accent)":"var(--danger)"}>
              <div style={{fontSize:mc?"1rem":"0.78rem",color:"var(--text-dim)",marginBottom:4}}>Q{i+1}</div>
              <div style={{fontSize:mc?"1.1rem":"0.92rem",marginBottom:8,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{q.question}</div>
              {ok?<div style={{color:"var(--accent)",fontSize:mc?"1.1rem":"0.88rem"}}>✔ {q.choices[ua]}</div>:<>
                <div style={{color:"var(--danger)",fontSize:mc?"1.1rem":"0.85rem"}}>✘ Your answer: {ua!==undefined?q.choices[ua]:"Skipped"}</div>
                <div style={{color:"var(--accent)",fontSize:mc?"1.1rem":"0.85rem"}}>✔ Correct: {q.choices[q.answer]}</div>
                {q.explanation&&<div style={{marginTop:8,fontSize:mc?"1rem":"0.82rem",color:"var(--text-dim)",background:"var(--surface2)",padding:"8px 12px",borderRadius:"var(--radius)",borderLeft:"3px solid var(--warn)"}}>💡 {q.explanation}</div>}
              </>}
            </Panel>
          );})}
        </div>
        <div style={{display:"flex",gap:12,marginTop:24}}>
          <Btn variant="green" style={{flex:1}} onClick={()=>{setAnswers({});setRevealed({});setCurrent(0);setShowResult(false);}}>{mc?"🔁 RETRY":"🔁 Retry"}</Btn>
          <Btn variant="red" style={{flex:1}} onClick={onBack}>{mc?"🏠 MENU":"🏠 Menu"}</Btn>
        </div>
      </div>
    );
  }

  return (
    <div className="slide-in" style={{maxWidth:600,margin:"0 auto",padding:"40px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <Btn onClick={onBack} style={{fontSize:mc?"1rem":"0.8rem"}}>{mc?"✕ EXIT":"✕ Exit"}</Btn>
        <span style={{fontFamily:"var(--font)",fontSize:mc?"1.1rem":"0.8rem",color:"var(--text-dim)"}}>{subject} · {period}</span>
        <span style={{fontFamily:"var(--font)",fontSize:mc?"1.1rem":"0.8rem",color:"var(--text-dim)"}}>{current+1}/{questions.length}</span>
      </div>
      <ProgBar value={(current+1)/questions.length}/>
      <Panel style={{marginBottom:16}}>
        <div style={{fontSize:mc?"0.85rem":"0.72rem",color:"var(--text-dim)",marginBottom:8,textTransform:"uppercase",letterSpacing:2}}>Question {current+1}</div>
        <div style={{fontSize:mc?"1.3rem":"1rem",lineHeight:1.6,whiteSpace:"pre-wrap",fontFamily:q.question.includes("\n")?"monospace":"var(--font)"}}>{q.question}</div>
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
        {q.choices.map((choice,idx)=>{
          let variant="default";
          if(isRev){if(idx===q.answer)variant="green";else if(idx===ua)variant="red";}
          else if(ua===idx)variant="blue";
          if(isforms){
            const isSel=ua===idx,isCorrR=isRev&&idx===q.answer,isWrR=isRev&&idx===ua&&ua!==q.answer;
            return <div key={idx} onClick={()=>handleAns(idx)} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 16px",borderRadius:"var(--radius)",border:`2px solid ${isCorrR?"var(--accent)":isWrR?"var(--danger)":isSel?"var(--accent)":"var(--border)"}`,background:isCorrR?"rgba(45,106,79,0.08)":isWrR?"rgba(155,35,53,0.08)":isSel?"rgba(103,58,183,0.06)":"var(--surface)",cursor:isRev?"default":"pointer",transition:"all 0.15s",fontSize:"0.95rem"}}>
              <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,border:`2px solid ${isCorrR?"var(--accent)":isWrR?"var(--danger)":isSel?"var(--accent)":"var(--border)"}`,background:isSel||isCorrR?"var(--accent)":isWrR?"var(--danger)":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>

            {mc?`${String.fromCharCode(65+idx)}. `:""}{choice}</Btn>;
        })}

      {isRev&&ua!==q.answer&&q.explanation&&<Panel accent="var(--warn)" style={{marginBottom:14}}>
        <div style={{fontSize:mc?"1rem":"0.78rem",color:"var(--warn)",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>💡 Explanation</div>
        <div style={{fontSize:mc?"1.1rem":"0.92rem",lineHeight:1.6}}>{q.explanation}</div>
      </Panel>}
      {isRev&&ua===q.answer&&<Panel accent="var(--accent)" style={{marginBottom:14}}>
        <div style={{fontSize:mc?"1.1rem":"0.92rem",color:"var(--accent)"}}>✔ {mc?"CORRECT!":"Correct!"}</div>
      </Panel>}
      <div style={{display:"flex",gap:12}}>
        <Btn disabled={current===0} style={{flex:1}} onClick={()=>setCurrent(c=>c-1)}>{mc?"◀ PREV":"← Prev"}</Btn>

      </div>
    </div>
  );
}

function CodeQuizScreen({ config, onBack }) {
